<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NetSurBot - Cortes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>:root { --bulma-body-background-color: #0a0a0f; } .sidebar { min-height: 100vh; } @media screen and (max-width: 768px) { .sidebar { min-height: auto; } }</style>
</head>
<body>
  <nav class="navbar is-dark" role="navigation">
    <div class="navbar-brand">
      <a class="navbar-item is-size-4 has-text-weight-bold" href="/admin/">
        <span class="icon-text"><span class="icon"><i class="fas fa-robot"></i></span><span>NetSurBot</span></span>
      </a>
      <a role="button" class="navbar-burger" data-target="navMenu"><span></span><span></span><span></span></a>
    </div>
  </nav>
  <div class="columns is-gapless">
    <div class="column is-2 sidebar" style="background: #0d0d14;">
      <aside class="menu p-3">
        <p class="menu-label">Navegación</p>
        <ul class="menu-list">
          <li><a href="/admin/"><span class="icon"><i class="fas fa-chart-pie"></i></span> Dashboard</a></li>
          <li><a href="/admin/clients.html"><span class="icon"><i class="fas fa-users"></i></span> Clientes</a></li>
          <li><a href="/admin/tickets.html"><span class="icon"><i class="fas fa-ticket"></i></span> Tickets</a></li>
          <li><a href="/admin/outages.html" class="is-active"><span class="icon"><i class="fas fa-exclamation-triangle"></i></span> Cortes</a></li>
          <li><a href="/admin/surveys.html"><span class="icon"><i class="fas fa-star"></i></span> Encuestas</a></li>
          <li><a href="/admin/visits.html"><span class="icon"><i class="fas fa-truck"></i></span> Visitas</a></li>
          <li><a href="/admin/templates.html"><span class="icon"><i class="fas fa-file-alt"></i></span> Plantillas</a></li>
        </ul>
      </aside>
    </div>
    <div class="column p-5">
      <h1 class="title is-3">Cortes e Incidencias</h1>
      <div id="outagesList"><p class="has-text-grey">Cargando...</p></div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelector('.navbar-burger')?.addEventListener('click', () => {
        document.getElementById('navMenu')?.classList.toggle('is-active')
      })
      loadOutages()
    })

    async function loadOutages() {
      try {
        const outages = await fetch('/api/outages').then(r => r.json())
        const container = document.getElementById('outagesList')
        if (!Array.isArray(outages) || outages.length === 0) {
          container.innerHTML = '<div class="notification is-success"><span class="icon"><i class="fas fa-check-circle"></i></span> No hay cortes activos en este momento.</div>'
          return
        }
        container.innerHTML = `<div class="notification is-warning"><strong>${outages.length}</strong> incidencia(s) activa(s)</div>
          ${outages.map(o => `<div class="box">
            <h3 class="title is-5 has-text-danger">${o.zone}</h3>
            <p>${o.description}</p>
            <p class="is-size-7 has-text-grey">Inicio: ${new Date(o.startTime).toLocaleString('es-AR')}</p>
            ${o.estimatedEndTime ? `<p class="is-size-7 has-text-grey">Resolución estimada: ${new Date(o.estimatedEndTime).toLocaleString('es-AR')}</p>` : ''}
            <span class="tag is-danger">Activo</span>
          </div>`).join('')}`
      } catch {
        document.getElementById('outagesList').innerHTML = '<div class="notification is-danger">Error al cargar incidencias</div>'
      }
    }
  </script>
</body>
</html>
